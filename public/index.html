<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo Automotivo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0d0d0d;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* MAIN */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px 40px;
      max-width: 700px;
      width: 100%;
      margin: 0 auto;
    }

    .eyebrow {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #e02020;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 48px;
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: -1px;
      color: #fff;
      margin-bottom: 10px;
    }

    h1 .dim { color: #555; }

    .desc {
      font-size: 14px;
      color: #888;
      font-weight: 300;
      margin-bottom: 48px;
      line-height: 1.6;
    }

    /* INPUT */
    .search-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .search-row {
      display: flex;
      gap: 0;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .search-row:focus-within {
      border-color: #e02020;
      box-shadow: 0 0 0 3px rgba(224,32,32,0.12);
    }

    input {
      flex: 1;
      background: #151515;
      border: none;
      color: #f0f0f0;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 400;
      padding: 16px 20px;
      outline: none;
    }

    input::placeholder { color: #555; }

    button {
      background: #e02020;
      color: #fff;
      border: none;
      padding: 16px 28px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    button:hover { background: #c41a1a; }
    button:active { background: #a81515; }
    button:disabled { background: #2a2a2a; color: #444; cursor: not-allowed; }

    /* ERRO */
    .erro {
      display: none;
      font-size: 13px;
      color: #e05050;
      padding: 10px 14px;
      background: #1a0d0d;
      border: 1px solid #3a1515;
      border-radius: 8px;
    }
    .erro.on { display: block; }

    /* RESULTADO */
    .resultado {
      display: none;
      margin-top: 48px;
    }
    .resultado.on { display: block; }

    .resultado-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .red-line {
      width: 3px;
      height: 20px;
      background: #e02020;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .resultado-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #666;
      background: #111;
      border: 1px solid #1f1f1f;
      border-radius: 10px;
      padding: 28px;
    }

    #texto {
      font-size: 14px;
      line-height: 1.85;
      color: #ccc;
      white-space: pre-wrap;
      font-weight: 300;
    }

    /* LOADING */
    .carregando {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #e02020;
      animation: blink 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; }
      40% { opacity: 1; }
    }

    /* FOOTER */
    footer {
      padding: 20px 40px;
      border-top: 1px solid #1a1a1a;
      font-size: 11px;
      color: #444;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

  <main>
    <p class="eyebrow">Consulta Inteligente</p>
    <h1>Catálogo<br><span class="dim">Técnico Automotivo Inteligente</span></h1>
    <p class="desc">Digite o modelo e ano para consultar especificações completas.</p>

    <div class="search-group">
      <div class="search-row">
        <input type="text" id="modelo" placeholder="Ex: Honda Civic 2024" autocomplete="off">
        <button id="btn" onclick="consultar()">Pesquisar</button>
      </div>
      <div class="erro" id="erro"></div>
    </div>

    <div class="resultado" id="resultado">
      <div class="resultado-header">
        <div class="red-line"></div>
        <span class="resultado-label">Resultado</span>
      </div>
      <div class="resultado-body">
        <div id="texto"></div>
      </div>
    </div>
  </main>

  <footer>Dados gerados via IA · Confirme com o fabricante</footer>

  <script>
    document.getElementById('modelo').addEventListener('keydown', e => {
      if (e.key === 'Enter') consultar();
    });

    async function consultar() {
      const modelo = document.getElementById('modelo').value.trim();
      const btn = document.getElementById('btn');
      const erro = document.getElementById('erro');
      const resultado = document.getElementById('resultado');
      const texto = document.getElementById('texto');

      if (!modelo) return;

      erro.classList.remove('on');
      btn.disabled = true;
      texto.innerHTML = '<div class="carregando"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
      resultado.classList.add('on');

      try {
        const res = await fetch('/api/llm', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt: modelo })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.erro || 'Erro desconhecido');

        texto.textContent = data.resposta;
        document.getElementById('modelo').value = '';
      } catch (err) {
        erro.textContent = err.message;
        erro.classList.add('on');
        resultado.classList.remove('on');
      } finally {
        btn.disabled = false;
      }
    }
  </script>

</body>
</html>
